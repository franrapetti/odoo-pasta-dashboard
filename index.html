      // States for interactiveness
      const [stationCount, setStationCount] = useState(5);
      const [usdRate, setUsdRate] = useState(1250); // Default cotizacion en Argentina (MEP/Blue)
      const [billingCycle, setBillingCycle] = useState('monthly'); // 'monthly' | 'annual'
      const [activeTab, setActiveTab] = useState('hardware');
      const [openRoadmapSteps, setOpenRoadmapSteps] = useState([0]); // First step open by default
      const [selectedBomNode, setSelectedBomNode] = useState('root');
      const [activeTraceStep, setActiveTraceStep] = useState(0);

      // Scroll event for sticky nav shadow
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 20);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // Calculations for Section 1 (Hardware)
      const unitHardware = {
        miniPc: 250,
        monitor: 280,
        soporte: 60,
      };
      const subtotalPerStation = unitHardware.miniPc + unitHardware.monitor + unitHardware.soporte;
      const totalStationsCost = subtotalPerStation * stationCount;
      
      const infrastructureCosts = {
        soportesTecho: 150,
        cableado: 100,
        router: 150,
      };
      const totalInfraCost = infrastructureCosts.soportesTecho + infrastructureCosts.cableado + infrastructureCosts.router;
      const grandTotalHardware = totalStationsCost + totalInfraCost;

      // Calculations for Section 2 (Licensing)
      const odooLicenseCost = 150; // USD/month for 10 users
      const odooHostingCost = 80;  // USD/month
      const licenseDiscount = billingCycle === 'annual' ? 0.15 : 0; // 15% discount for annual
      const totalSoftwareMonthly = (odooLicenseCost * (1 - licenseDiscount)) + odooHostingCost;
      const totalSoftwareYearly = totalSoftwareMonthly * 12;

      const formatCurrency = (valUsd) => {
        const usd = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(valUsd);
        const ars = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(valUsd * usdRate);
        return { usd, ars };
      };

      const toggleRoadmapStep = (index) => {
        if (openRoadmapSteps.includes(index)) {
          setOpenRoadmapSteps(openRoadmapSteps.filter(i => i !== index));
        } else {
          setOpenRoadmapSteps([...openRoadmapSteps, index]);
        }
      };

      const roadmapSteps = [
        {
          num: 1,
          title: "Paso 1: Relevamiento y Gap Analysis",
          subtitle: "Mapeo de mermas y procesos reales",
          duration: "Semanas 1 - 2",
          badge: "Planificación",
          badgeColor: "bg-blue-100 text-blue-800",
          details: "Consiste en la inmersión en la planta de pastas para relevar el flujo real de materiales (harina, sémola, huevo, agua) y detectar los puntos donde se generan mermas (roturas, evaporación, purgas de máquina). Se definirá el alcance funcional del MRP de Odoo y el flujo contable-administrativo contiguo.",
          keyPoints: ["Documento conceptual As-Is / To-Be.", "Definición del tipo de costo (Promedio vs Estándar).", "Identificación de ubicaciones de inventario físicas en planta."]
        },
        {
          num: 2,
          title: "Paso 2: Entorno Staging y Carga de Datos",
          subtitle: "Recetas e insumos normalizados",
          duration: "Semanas 3 - 5",
          badge: "Configuración",
          badgeColor: "bg-amber-100 text-amber-800",
          details: "Configuración inicial de la base de datos de prueba (Staging) en Odoo.sh. Carga masiva de maestros: clientes, proveedores, artículos (normalizando unidades de medida, ej: kg para harina, un para etiquetas) y la estructura de recetas multinivel (BOM). Pruebas iniciales de consumo de insumos.",
          keyPoints: ["Migración de catálogos y recetas.", "Pruebas de consumo teórico vs real.", "Definición de usuarios y permisos administrativos."]
        },
        {
          num: 3,
          title: "Paso 3: Instalación de Hardware y Cableado",
          subtitle: "Montaje físico industrial en planta",
          duration: "Semanas 5 - 6",
          badge: "Infraestructura",
          badgeColor: "bg-purple-100 text-purple-800",
          details: "Instalación de las Mini PCs Fanless e industriales en sus gabinetes y soportes VESA de pared en las 5 estaciones. Tendido de cable de red blindado UTP Cat 6 contra la estática de los motores del piso de fabricación y montaje del router TP-Link/Mikrotik con balanceo Dual WAN.",
          keyPoints: ["Mini PCs sin ventilador (sellado anti-harina).", "Red de baja latencia Gigabit cableada.", "Conectividad redundante de respaldo 4G/Fibra configurada."]
        },
        {
          num: 4,
          title: "Paso 4: Capacitación Operarios y Key Users",
          subtitle: "Pruebas piloto en modo kiosco/tablet",
          duration: "Semanas 7 - 8",
          badge: "Adopción",
          badgeColor: "bg-teal-100 text-teal-800",
          details: "Talleres y simulacros de producción directamente en el piso de planta utilizando las interfaces táctiles instaladas. Los operarios registrarán órdenes de trabajo en el Panel de Pantalla de Odoo en tiempo real (modo quiosco). Los administradores se capacitarán en flujos de compras, facturación y trazabilidad.",
          keyPoints: ["Simulaciones en el puesto físico de trabajo.", "Feedback de operarios para simplificar vistas.", "Aprobación de roles críticos (Key Users)."]
        },
        {
          num: 5,
          title: "Paso 5: Go-Live y Soporte",
          subtitle: "Lanzamiento y Hypercare presencial",
          duration: "Semana 9 en adelante",
          badge: "Producción",

        {
          step: "1. Recepción Harina",
          badge: "Lote Proveedor",
          desc: "Ingreso de materia prima a planta. Se registra el lote asignado por el molino harinero (Ej: Molino Cañuelas - Lote H-992). Odoo le genera un código de trazabilidad interno.",

              </div>

              <h1 className="text-3xl sm:text-4xl md:text-5xl font-extrabold tracking-tight">

              <p className="text-slate-300 text-base sm:text-lg md:text-xl font-light max-w-2xl mx-auto leading-relaxed">

                <div className="bg-white/5 backdrop-blur-md rounded-xl p-3 border border-white/10 text-left min-w-[140px] shadow-sm">
                  <div className="text-xs text-slate-400 uppercase font-semibold">Inversión Planta</div>
                  <div className="text-lg font-bold text-white mt-0.5">{formatCurrency(grandTotalHardware).usd}</div>
                  <div className="text-[10px] text-slate-400">Total en Hardware</div>

                            onClick={(e) => { e.stopPropagation(); setSelectedBomNode('masa'); }}
                            className={`flex items-center gap-2 p-1.5 rounded cursor-pointer transition-all ${selectedBomNode === 'masa' ? 'bg-odoo-100 border-l-2 border-odoo text-odoo-900 font-bold' : 'hover:bg-slate-100 text-slate-800'}`}
                          >
                            <span>🥣</span>
                            <span>[S-005] Masa Laminada (0.3 kg)</span>
                          </div>

                          {/* Level 3 Nodes (Inside Masa) */}
                          <div className="pl-6 border-l-2 border-slate-200 space-y-2 ml-2.5">
                            <div className="text-slate-500">🌾 Harina 0000 (0.25 kg)</div>
                            <div className="text-slate-500">🥚 Huevo Líquido (0.05 kg)</div>
                            <div className="text-slate-500 flex items-center gap-1">
                              💧 Agua (0.02 L) 
                              <span className="text-[9px] bg-red-100 text-red-700 px-1 rounded font-sans font-semibold">- Evaporación</span>
                            </div>
                          </div>

                          <div 
                            onClick={(e) => { e.stopPropagation(); setSelectedBomNode('relleno'); }}
                            className={`flex items-center gap-2 p-1.5 rounded cursor-pointer transition-all ${selectedBomNode === 'relleno' ? 'bg-odoo-100 border-l-2 border-odoo text-odoo-900 font-bold' : 'hover:bg-slate-100 text-slate-800'}`}
                          >
                            <span>🥩</span>
                            <span>[S-008] Relleno de Carne (0.22 kg)</span>
                          </div>

                        </div>

                      </div>

                    </div>
                  </div>

                  {/* Dynamic BOM Node detail panel */}
                  <div className="mt-4 p-3.5 bg-slate-50 rounded-xl border border-slate-200 text-xs">
                    {selectedBomNode === 'root' && (
                      <div>
                        <span className="font-bold text-slate-800 uppercase block mb-1">Raviol de Carne 500g (Producto Terminado)</span>
                        <p className="text-slate-500">El producto final que va a la góndola de venta. Requiere un proceso de empaquetado final que consolida los insumos secos (caja y etiqueta) con el semielaborado (ravioles a granel).</p>
                      </div>
                    )}
                    {selectedBomNode === 'caja' && (
                      <div>
                        <span className="font-bold text-slate-800 uppercase block mb-1">Caja de Cartón para Pasta Fresca</span>
                        <p className="text-slate-500">Insumo seco de empaque. Se descuenta de stock 1 unidad por cada caja producida. Almacenado en depósito seco.</p>
                      </div>
                    )}
                    {selectedBomNode === 'etiqueta' && (
                      <div>
                        <span className="font-bold text-slate-800 uppercase block mb-1">Etiqueta de Lote y Vencimiento</span>
                        <p className="text-slate-500">Contiene información crítica regulada (Lote, RNE, RNPA). Se imprime en el piso de fábrica mediante balanzas conectadas por Odoo IoT Box en la fase 1.</p>
                      </div>
                    )}
                    {selectedBomNode === 'granel' && (
                      <div>
                        <span className="font-bold text-slate-800 uppercase block mb-1">Raviol a Granel (+4% Merma)</span>
                        <p className="text-slate-500">Subproducto del moldeado. Se proyecta un 4% de merma teórica por descarte de masa residual de moldes y rotura en cinta de enfriamiento rápido. Esta merma es reingresada o descartada según auditoría de calidad.</p>
                      </div>
                    )}
                    {selectedBomNode === 'masa' && (
                      <div>
                        <span className="font-bold text-slate-800 uppercase block mb-1">Masa Laminada Estándar</span>
                        <p className="text-slate-500">Semielaborado intermedio que requiere amasado y extrusión. Odoo calcula el consumo neto de Harina y Huevo. El agua agregada se evapora parcialmente en el secador, lo que se descuenta en la receta.</p>
                      </div>
                    )}
                    {selectedBomNode === 'relleno' && (
                      <div>
                        <span className="font-bold text-slate-800 uppercase block mb-1">Relleno de Carne Cocida</span>
                        <p className="text-slate-500">Preparado cárnico intermedio bajo cadena de frío obligatoria. Se cocina en marmitas (registrando consumo de gas y horas operario) antes de ser enviado a la tolva inyectora de la raviolera.</p>
                      </div>
                    )}
                  </div>
                </div>

              </div>

              {/* Trazabilidad Ininterrumpida Horizontal flow */}
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-4">
                <h3 className="font-bold text-lg text-slate-900 border-b border-slate-100 pb-3">
                  Trazabilidad Ininterrumpida por Lotes (ANMAT / SENASA)
                </h3>
                <p className="text-xs text-slate-500">
                  Haz clic en las etapas de la cadena para ver cómo Odoo automatiza el rastreo del lote alimenticio.
                </p>

                {/* Steps Timeline Grid */}
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 pt-2">
                  {traceabilitySteps.map((step, idx) => (
                    <div 
                      key={idx}
                      onClick={() => setActiveTraceStep(idx)}
                      className={`cursor-pointer p-4 rounded-xl border transition-all ${activeTraceStep === idx ? 'bg-gradient-to-br from-slate-800 to-slate-950 text-white border-slate-950 scale-102 shadow-md' : 'bg-slate-50 text-slate-700 border-slate-200 hover:bg-slate-100'}`}
                    >
                      <div className="flex items-center justify-between mb-3">
                        <span className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ${activeTraceStep === idx ? 'bg-odoo text-white' : 'bg-slate-200 text-slate-700'}`}>
                          {idx + 1}
                        </span>
                        <span>{step.icon}</span>
                      </div>
                      <h4 className="font-bold text-sm leading-tight">{step.step}</h4>
                      <span className={`inline-block mt-2 px-2 py-0.5 rounded text-[10px] font-bold ${activeTraceStep === idx ? 'bg-white/10 text-odoo-300' : 'bg-slate-200 text-slate-600'}`}>
                        {step.badge}
                      </span>
                    </div>
                  ))}
                </div>

                {/* Selected Traceability Description Detail */}
                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-2 mt-4 transition-all">
                  <div className="flex justify-between items-center">
                    <span className="text-xs font-extrabold text-odoo uppercase">Control de Calidad y Stock</span>
                    <span className="text-[10px] bg-slate-200 text-slate-600 font-bold px-2 py-0.5 rounded-full">{traceabilitySteps[activeTraceStep].morp}</span>
                  </div>
                  <h4 className="font-bold text-sm text-slate-900">{traceabilitySteps[activeTraceStep].step} ({traceabilitySteps[activeTraceStep].badge})</h4>
                  <p className="text-xs text-slate-600 leading-relaxed">{traceabilitySteps[activeTraceStep].desc}</p>
                </div>
              </div>
            </section>

            {/* Section 4: Roadmap de Implementación */}
            <section id="roadmap" className="scroll-mt-24 space-y-6">
              <div className="border-b border-slate-200 pb-4">
                <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                  <span className="p-1.5 bg-odoo-100 text-odoo-700 rounded-lg"><Icons.Calendar /></span>
                  4. Hoja de Ruta de Implementación IT & ERP (2026)
                </h2>
                <p className="text-sm text-slate-500 mt-1">
                  Estrategia secuencial paso a paso recomendada por consultoría para mitigar el riesgo operativo en planta.
                </p>
              </div>

              {/* Progress Bar of Roadmap based on opened steps */}
              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-2">
                <div className="flex justify-between text-xs text-slate-500 font-semibold">
                  <span>Hitos de Implementación Analizados:</span>
                  <span>{openRoadmapSteps.length} de 5 Pasos Examinados</span>
                </div>
                <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                  <div 
                    className="h-full bg-gradient-to-r from-odoo to-emerald-500 transition-all duration-500" 
                    style={{ width: `${(openRoadmapSteps.length / 5) * 100}%` }}
                  ></div>
                </div>
              </div>

              {/* Vertical Accordion Roadmap */}
              <div className="max-w-4xl mx-auto space-y-3">
                {roadmapSteps.map((step, idx) => {
                  const isOpen = openRoadmapSteps.includes(idx);
                  return (
                    <div 
                      key={idx} 
                      className={`bg-white rounded-xl border transition-all duration-200 ${isOpen ? 'border-odoo shadow-sm' : 'border-slate-200 hover:border-slate-300'}`}
                    >
                      {/* Accordion Trigger Header */}
                      <button 
                        onClick={() => toggleRoadmapStep(idx)}
                        className="w-full flex items-center justify-between p-4 sm:p-5 text-left focus:outline-none"
                      >
                        <div className="flex items-center gap-4">
                          <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shrink-0 ${isOpen ? 'bg-odoo text-white' : 'bg-slate-100 text-slate-600'}`}>
                            {step.num}
                          </span>
                          <div>
                            <h3 className="font-bold text-sm sm:text-base text-slate-800 leading-snug">{step.title}</h3>
                            <p className="text-xs text-slate-400 mt-0.5">{step.subtitle} • {step.duration}</p>
                          </div>
                        </div>
                        
                        <div className="flex items-center gap-2">
                          <span className={`hidden sm:inline-block text-[10px] font-bold px-2 py-0.5 rounded-full ${step.badgeColor}`}>
                            {step.badge}
                          </span>
                          <div className={isOpen ? 'rotate-180 text-odoo' : 'rotate-0 text-slate-400'}>
                            <Icons.ChevronDown />
                          </div>
                        </div>
                      </button>

                      {/* Accordion Expandable Content */}
                      {isOpen && (
                        <div className="px-5 pb-5 pt-1 border-t border-slate-100 text-xs sm:text-sm text-slate-600 space-y-4">
                          <p className="leading-relaxed text-slate-500">{step.details}</p>
                          
                          <div className="bg-slate-50 p-3.5 rounded-xl border border-slate-100 space-y-2">
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">Entregables y Metas Clave:</span>
                            <ul className="space-y-1.5">
                              {step.keyPoints.map((point, pIdx) => (
                                <li key={pIdx} className="flex items-start gap-2 text-xs text-slate-600">
                                  <span className="text-emerald-500 shrink-0 mt-0.5"><Icons.Check /></span>
                                  <span>{point}</span>
                                </li>
                              ))}
                            </ul>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </section>

          </main>

          {/* Executive footer */}
          <footer className="bg-slate-900 text-slate-400 py-10 mt-16 text-center text-xs border-t border-slate-800">
            <div className="max-w-7xl mx-auto px-4 space-y-3">
              <p className="font-medium text-slate-300">Informe Técnico de Digitalización e Infraestructura IT en Planta de Alimentos</p>
              <p className="max-w-md mx-auto text-slate-500">Este informe constituye una proyección orientativa y técnica. Los costos definitivos de Odoo Enterprise y servidores deben ser cotizados con el partner local en Argentina al momento del cierre contractual.</p>
              <div className="pt-4 text-slate-600">© 2026 Planta de Pastas Argentina. Todos los derechos reservados.</div>
            </div>
          </footer>

        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>

</body>
</html>
